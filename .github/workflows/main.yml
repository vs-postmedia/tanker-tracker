# This is a basic workflow to help you get started with Actions

name: Open AisStream socket 

# Controls when the workflow will run
on:
  # Triggered externally by cron-job.org via workflow_dispatch for reliable hourly scheduling
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # node-version: [22.x]
        node-version: [24.x]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Verify Node.js version
        run: node -v # print nodejs version

      # Install needed libs
      - name: Install dependencies
        run: |
          npm ci

      # Runs scraper
      - name: Run the scraper
        env:
          API_KEY_AISSTREAM: ${{ secrets.API_KEY_AISSTREAM }}
          LOGIN_EQUASIS: ${{ secrets.LOGIN_EQUASIS }}
          PASS_EQUASIS: ${{ secrets.PASS_EQUASIS }}
        run: |
          node index.js
      
      # pull latest changes
      # - name: stash existing changes
      #   run: git stash
      # - name: Pull latest changes
      #   run: git pull --rebase origin master

      # Commit changes
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          # Defaults to "Apply automatic changes"
          commit_message: Updated with latest data

  
